<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKB β</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Analyzer for Kyushu Battlefield β</h1>

    <p class="version">
        Version 0.1.0
    </p>

    <div class="card">

        <h2>📷 戦況画像</h2>

        <input
            type="file"
            id="imageInput"
            accept="image/*">

    </div>

    <div class="card">

        <img
            id="preview"
            src=""
            alt="画像が表示されます">
　　<button id="analyzeButton">

        解析開始

    </button>
    </div>

 <div class="card">

    <h2>切り抜き画像</h2>

    <div class="crop-area">

        <div>
            <h3>① 西</h3>
            <canvas id="westCanvas"></canvas>
        </div>

        <div>
            <h3>② 北</h3>
            <canvas id="northCanvas"></canvas>
        </div>

        <div>
            <h3>③ 中央</h3>
            <canvas id="centerCanvas"></canvas>
        </div>

        <div>
            <h3>④ 南</h3>
            <canvas id="southCanvas"></canvas>
        </div>

        <div>
            <h3>⑤ 東</h3>
            <canvas id="eastCanvas"></canvas>
        </div>

    </div>

    <h2>解析結果</h2>

    <pre id="result"></pre>

</div>
      
</div>

</div>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="script.js"></script>
</body>
</html>
