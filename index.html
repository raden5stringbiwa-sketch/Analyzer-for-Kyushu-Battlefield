<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKB β</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Analyzer for Kyushu Battlefield β</h1>

    <p class="version">
        Version 0.1.0
    </p>

    <div class="card">

        <h2>📷 戦況画像</h2>

        <input
            type="file"
            id="imageInput"
            accept="image/*">

    </div>

    <div class="card">

        <img
            id="preview"
            src=""
            alt="画像が表示されます">
　　<button id="analyzeButton">

        解析開始

    </button>
    </div>

    <div class="card">

        <h2>解析結果</h2>

        <div id="result">

            まだ解析していません

        </div>

    </div>

</div>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="script.js"></script>
</body>
</html>
